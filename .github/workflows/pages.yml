name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build site
        run: node scripts/build-docs-site.mjs

      - name: Check Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pages is not enabled for this repository; skipping deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/docs-site

      - name: Deploy
        if: steps.pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
